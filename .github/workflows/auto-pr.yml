name: Pull Request AutomĂĄtico
on:
  push:
    branches:
      - "feature/**"
      - "fix/**"
      - "chore/**"
jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Extrair informaĂ§Ă”es da branch
        id: branch-info
        run: |
          BRANCH="${{ github.ref_name }}"
          TYPE=$(echo $BRANCH | cut -d/ -f1) # feature, fix, chore
          NAME=$(echo $BRANCH | cut -d/ -f2-) # nome da feature
          echo "type=$TYPE" >> $GITHUB_OUTPUT
          echo "name=$NAME" >> $GITHUB_OUTPUT
      - name: Criar Pull Request
        uses: actions/github-script@v7
        with:
          script: |
            const { type, name } = {
              type: "${{ steps.branch-info.outputs.type }}",
              name: "${{ steps.branch-info.outputs.name }}"
            };
            const titles = {
              feature: `âš Feature: ${name}`,
              fix: `đ Fix: ${name}`,
              chore: `đ§ Chore: ${name}`
            };
            const labels = {
              feature: ["feature", "needs-review"],
              fix: ["bug", "fix", "needs-review"],
              chore: ["chore", "maintenance"]
            };
            // Verificar se jĂĄ existe PR para esta branch
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${{ github.ref_name }}`,
              state: "open"
            });
            if (prs.data.length > 0) {
              console.log("PR jĂĄ existe:", prs.data[0].html_url);
              return;
            }
            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: titles[type] || `đ ${name}`,
              body: `## DescriĂ§ĂŁo\nPR criado automaticamente para a branch \`${{ github.ref_name }}\`\n\n ## Checklist\n- [ ] Testes adicionados\n- [ ] DocumentaĂ§ĂŁo atualizada\n - [ ] Quality gate passou\n- [ ] RevisĂŁo de cĂłdigo realizada`,
              head: "${{ github.ref_name }}",
              base: "main",
              draft: false
            });
            // Adicionar labels
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.data.number,
              labels: labels[type] || ["needs-review"]
            });
            console.log("PR criado:", pr.data.html_url);
