# Nome do workflow exibido no GitHub Actions
name: Quality Gate com IA (GroqCloud) - Autorizado
 
# Define como o workflow será executado
on:
 
  # Permite execução manual pelo botão "Run workflow"
  workflow_dispatch:
 
# Lista de jobs do workflow
jobs:
 
  # Nome interno do job
  quality-gate-ia-gratuita:
 
    # Máquina virtual Linux utilizada
    runs-on: ubuntu-latest
 
    # Lista de etapas do pipeline
    steps:
 
      # Faz clone do repositório
      - name: Clonar repositório
        uses: actions/checkout@v4
 
      # Configura ambiente Python
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
 
          # Define versão do Python
          python-version: '3.11'
 
      # Instala dependências necessárias
      - name: Instalar dependências
        run: |
 
          # Framework de testes
          pip install pytest pytest-cov
 
      # Executa testes e coleta cobertura
      - name: Coletar métricas
 
        # Variáveis de ambiente
        env:
 
          # Faz Python reconhecer raiz do projeto
          PYTHONPATH: .
 
        run: |
 
          # Executa testes com cobertura
          # O || true evita parar pipeline imediatamente
          pytest tests_alta_ia_autorizado --cov=src_alta --cov-report=json -q || true
 
          # Lê cobertura do arquivo JSON
          COV=$(python -c "import json; d=json.load(open('coverage.json')); print(round(d['totals']['percent_covered']))")
 
          # Salva cobertura como variável global da pipeline
          echo "COVERAGE=$COV" >> $GITHUB_ENV
 
      # Consulta IA da GroqCloud
      - name: Consultar IA — Quality Gate
 
        # Variáveis protegidas do GitHub Secrets
        env:
 
          # Chave da API GroqCloud
          GROQCLOUD_API_KEY: ${{ secrets.GROQCLOUD_API_KEY }}
 
        run: |
 
          echo "Consultando IA sobre qualidade do código..."
 
          # Faz requisição HTTP para API da GroqCloud
          RESPONSE=$(curl -s https://api.groq.com/openai/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $GROQCLOUD_API_KEY" \
            -d '{
              "model": "llama-3.1-8b-instant",
              "messages": [
                {
                  "role": "system",
                  "content": "Você é um quality gate de pipeline CI/CD. Responda apenas APROVADO ou BLOQUEADO seguido de uma justificativa curta."
                },
                {
                  "role": "user",
                  "content": "Cobertura de testes: '"$COVERAGE"'%. Projeto Python com tratamento de divisão por zero e testes automatizados cobrindo cenários principais. Deve avançar para produção?"
                }
              ]
            }')
 
            # Exibe resposta da API
            echo "Resposta da IA:"
            echo "$RESPONSE"
 
            # Extrai apenas o texto da resposta da IA
            DECISION=$(echo "$RESPONSE" | python3 -c "import sys,json; r=json.load(sys.stdin); print(r['choices'][0]['message']['content'] if 'choices' in r else 'BLOQUEADO - erro ao consultar IA')")
           
            # Mostra decisão final
            echo "$DECISION"
           
            # Se a IA responder BLOQUEADO
            if echo "$DECISION" | grep -q "BLOQUEADO"; then
           
              # Cria erro visível no GitHub Actions
              echo "::error::Quality Gate BLOQUEADO pela IA"
           
              # Falha pipeline
              exit 1
           
            fi
 