name: IA analisando traces
 
on:
  workflow_dispatch:
 
permissions:
  issues: write
 
jobs:
 
  analisar-traces:
 
    runs-on: ubuntu-latest
 
    steps:
 
      - uses: actions/checkout@v4
 
      - name: Login GitHub CLI
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token
 
      - name: IA analisa traces
        env:
          GROQCLOUD_API_KEY: ${{ secrets.GROQCLOUD_API_KEY }}
 
        run: |
 
          TRACE=$(cat traces/payment_trace.txt | tr '\n' ' ')
 
          RESPONSE=$(curl -s https://api.groq.com/openai/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $GROQCLOUD_API_KEY" \
            -d '{
              "model": "llama-3.1-8b-instant",
              "messages": [
                {
                  "role": "system",
                  "content": "Você é especialista em distributed tracing."
                },
                {
                  "role": "user",
                  "content": "Analise este trace distribuído e identifique gargalos de forma detalhada e descritiva: '"$TRACE"'"
                }
              ]
            }')
 
          echo "$RESPONSE"
 
          DECISION=$(echo "$RESPONSE" | python3 -c "import sys,json; r=json.load(sys.stdin); print(r['choices'][0]['message']['content'])")
 
          echo "$DECISION"
 
          if echo "$DECISION" | grep -qiE "timeout|gargalo|crítico"; then
 
            gh issue create \
              --title "Gargalo detectado em trace distribuído" \
              --body "$DECISION"
 
            exit 1
 
          fi
 