name: Cobertura Baixa com IA GroqCloud

on:
  workflow_dispatch:

jobs:
  cobertura-baixa-ia-groqcloud:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          pip install pytest pytest-cov

      - name: Coletar métricas
        env:
          PYTHONPATH: .
        run: |
          TEST_STATUS=0

          pytest tests_baixa --cov=src_baixa --cov-report=json -q || TEST_STATUS=$?

          if [ -f coverage.json ]; then
            COV=$(python -c "import json; d=json.load(open('coverage.json')); print(round(d['totals']['percent_covered']))")
          else
            COV=0
          fi

          echo "COVERAGE=$COV" >> $GITHUB_ENV
          echo "TEST_STATUS=$TEST_STATUS" >> $GITHUB_ENV

          echo "Cobertura encontrada: $COV%"
          echo "Status dos testes: $TEST_STATUS"

      - name: Consultar IA — Quality Gate
        env:
          GROQCLOUD_API_KEY: ${{ secrets.GROQCLOUD_API_KEY }}
        run: |
          echo "Consultando IA sobre qualidade do código..."

          RESPONSE=$(curl -s https://api.groq.com/openai/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $GROQCLOUD_API_KEY" \
            -d '{
              "model": "llama-3.1-8b-instant",
              "messages": [
                {
                  "role": "system",
                  "content": "Você é um quality gate de pipeline CI/CD. Responda apenas APROVADO ou BLOQUEADO seguido de uma justificativa curta."
                },
                {
                  "role": "user",
                  "content": "Cobertura de testes: '"$COVERAGE"'%. Status dos testes automatizados: '"$TEST_STATUS"'. Projeto Python SmartShop Cloud. Critério mínimo de cobertura: 80%. Se a cobertura estiver abaixo de 80% ou se os testes falharam, bloqueie a pipeline. Deve avançar para produção?"
                }
              ]
            }')

          echo "Resposta da IA:"
          echo "$RESPONSE"

          DECISION=$(echo "$RESPONSE" | python3 -c "import sys,json; r=json.load(sys.stdin); print(r['choices'][0]['message']['content'] if 'choices' in r else 'BLOQUEADO - erro ao consultar IA')")

          echo "$DECISION"

          if echo "$DECISION" | grep -q "BLOQUEADO"; then
            echo "::error::Quality Gate BLOQUEADO pela IA"
            exit 1
          fi

          echo "Quality Gate APROVADO pela IA"